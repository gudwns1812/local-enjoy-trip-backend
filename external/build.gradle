plugins {
    id 'io.spring.dependency-management'
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.boot:spring-boot-dependencies:${rootProject.ext.springBootVersion}"
        mavenBom "org.springframework.ai:spring-ai-bom:${rootProject.ext.springAiVersion}"
    }
}

dependencies {
    implementation project(':core:core-api')

    implementation 'org.springframework:spring-web'
    implementation 'org.springframework:spring-context'
    implementation 'org.springframework.boot:spring-boot-starter-json'
    implementation "org.springframework.ai:spring-ai-starter-model-openai:${rootProject.ext.springAiVersion}"
    implementation 'com.fasterxml.jackson.core:jackson-databind'
    implementation 'com.clickhouse:clickhouse-jdbc:0.9.8'
    implementation 'io.minio:minio:8.5.17'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

tasks.named('test') {
    useJUnitPlatform()
}
