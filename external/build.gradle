plugins {
    id "io.spring.dependency-management"
    id "java-library"
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.boot:spring-boot-dependencies:${rootProject.ext.springBootVersion}"
        mavenBom "org.springframework.ai:spring-ai-bom:${rootProject.ext.springAiVersion}"
    }
}

dependencies {
    api "org.springframework:spring-web"
    api "org.springframework.boot:spring-boot"
    api "org.springframework.boot:spring-boot-autoconfigure"
    api "org.springframework.ai:spring-ai-starter-model-openai:${rootProject.ext.springAiVersion}"

    implementation "io.minio:minio:${rootProject.ext.minioVersion}"

    testImplementation "org.springframework.boot:spring-boot-starter-test"
}
