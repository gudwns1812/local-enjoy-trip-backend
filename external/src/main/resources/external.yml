spring:
  ai:
    model:
      chat: openai
    openai:
      api-key: ${GMS_KEY:local-fallback-disabled}
      chat:
        base-url: ${GMS_CHAT_BASE_URL:https://gms.ssafy.io/gmsapi/api.openai.com}
        api-key: ${GMS_KEY:local-fallback-disabled}
        model: ${GMS_CHAT_MODEL:gpt-5.4}

enjoytrip:
  ai:
    briefing:
      gms:
        api-key: ${GMS_KEY:}
        max-length: ${GMS_BRIEFING_MAX_LENGTH:160}
  external:
    open-weather-map:
      api-key: ${OPENWEATHERMAP_API_KEY:${OPENWEATHER_API_KEY:}}
  minio:
    endpoint: ${ENJOYTRIP_MINIO_ENDPOINT:http://localhost:9000}
    bucket: ${ENJOYTRIP_MINIO_BUCKET:dongnepin-notes}
    access-key: ${ENJOYTRIP_MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${ENJOYTRIP_MINIO_SECRET_KEY:minioadmin}
    region: ${ENJOYTRIP_MINIO_REGION:ap-northeast-2}
    public-base-url: ${ENJOYTRIP_MINIO_PUBLIC_BASE_URL:http://localhost:9000/dongnepin-notes}
    upload-expiry: ${ENJOYTRIP_MINIO_UPLOAD_EXPIRY:10m}
