services:
  db:
    build:
      context: ./infra/postgres-vector
    image: enjoytrip-postgis-pgvector:17-3.5
    platform: linux/amd64
    container_name: enjoytrip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - enjoytrip-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: enjoytrip-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - enjoytrip-pgadmin-data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: enjoytrip-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: enjoytrip-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${ENJOYTRIP_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${ENJOYTRIP_MINIO_SECRET_KEY:-minioadmin}
      TZ: Asia/Seoul
    ports:
      - "${MINIO_API_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - enjoytrip-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio-bootstrap:
    image: minio/mc:latest
    container_name: enjoytrip-minio-bootstrap
    depends_on:
      minio:
        condition: service_healthy
    environment:
      ENJOYTRIP_MINIO_BUCKET: ${ENJOYTRIP_MINIO_BUCKET:-dongnepin-notes}
      ENJOYTRIP_MINIO_ACCESS_KEY: ${ENJOYTRIP_MINIO_ACCESS_KEY:-minioadmin}
      ENJOYTRIP_MINIO_SECRET_KEY: ${ENJOYTRIP_MINIO_SECRET_KEY:-minioadmin}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$${ENJOYTRIP_MINIO_ACCESS_KEY}" "$${ENJOYTRIP_MINIO_SECRET_KEY}"
        mc mb --ignore-existing "local/$${ENJOYTRIP_MINIO_BUCKET}"
        mc anonymous set download "local/$${ENJOYTRIP_MINIO_BUCKET}"


  tempo:
    image: grafana/tempo:2.10.5
    container_name: enjoytrip-tempo
    restart: unless-stopped
    profiles: ["observability"]
    command:
      - -config.file=/etc/tempo/tempo.yml
    ports:
      - "${TEMPO_HTTP_PORT:-13200}:3200"
      - "${TEMPO_OTLP_GRPC_PORT:-14317}:4317"
      - "${TEMPO_OTLP_HTTP_PORT:-14318}:4318"
    volumes:
      - ./infra/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - enjoytrip-tempo-data:/var/tempo

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.128.0
    container_name: enjoytrip-otel-collector
    restart: unless-stopped
    profiles: ["observability"]
    command:
      - --config=/etc/otelcol-contrib/config.yml
    ports:
      - "${OTEL_COLLECTOR_OTLP_GRPC_PORT:-4317}:4317"
      - "${OTEL_COLLECTOR_OTLP_HTTP_PORT:-4318}:4318"
      - "${OTEL_COLLECTOR_PROMETHEUS_PORT:-9464}:9464"
    volumes:
      - ./infra/otel-collector/config.yml:/etc/otelcol-contrib/config.yml:ro
    depends_on:
      - tempo

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: enjoytrip-prometheus
    restart: unless-stopped
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-13090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - enjoytrip-prometheus-data:/prometheus
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:12.0.2
    container_name: enjoytrip-grafana
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: light
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "${GRAFANA_PORT:-13002}:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - enjoytrip-grafana-data:/var/lib/grafana
    depends_on:
      - tempo
      - prometheus


volumes:
  enjoytrip-postgres-data:
  enjoytrip-minio-data:
  enjoytrip-pgadmin-data:
  enjoytrip-tempo-data:
  enjoytrip-grafana-data:
  enjoytrip-prometheus-data:
