services:
  db:
    build:
      context: ./infra/postgres-vector
    image: enjoytrip-postgis-pgvector:17-3.5
    platform: linux/amd64
    container_name: enjoytrip-postgres
    restart: unless-stopped
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
      - -c
      - max_slot_wal_keep_size=1024MB
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - enjoytrip-postgres-data:/var/lib/postgresql/data
      - ./infra/cdc/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: enjoytrip-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - enjoytrip-pgadmin-data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: enjoytrip-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  tempo:
    image: grafana/tempo:2.10.5
    container_name: enjoytrip-tempo
    restart: unless-stopped
    profiles: ["observability"]
    command:
      - -config.file=/etc/tempo/tempo.yml
    ports:
      - "${TEMPO_HTTP_PORT:-13200}:3200"
      - "${TEMPO_OTLP_GRPC_PORT:-14317}:4317"
      - "${TEMPO_OTLP_HTTP_PORT:-14318}:4318"
    volumes:
      - ./infra/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - enjoytrip-tempo-data:/var/tempo

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.128.0
    container_name: enjoytrip-otel-collector
    restart: unless-stopped
    profiles: ["observability"]
    command:
      - --config=/etc/otelcol-contrib/config.yml
    ports:
      - "${OTEL_COLLECTOR_OTLP_GRPC_PORT:-4317}:4317"
      - "${OTEL_COLLECTOR_OTLP_HTTP_PORT:-4318}:4318"
      - "${OTEL_COLLECTOR_PROMETHEUS_PORT:-9464}:9464"
    volumes:
      - ./infra/otel-collector/config.yml:/etc/otelcol-contrib/config.yml:ro
    depends_on:
      - tempo

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: enjoytrip-prometheus
    restart: unless-stopped
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-13090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - enjoytrip-prometheus-data:/prometheus
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:12.0.2
    container_name: enjoytrip-grafana
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: light
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "${GRAFANA_PORT:-13002}:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - enjoytrip-grafana-data:/var/lib/grafana
    depends_on:
      - tempo
      - prometheus

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: enjoytrip-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_LOCAL_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      CLUSTER_ID: q1Sh-9_ISia_zwGINzRvyQ
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_LOCAL_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - enjoytrip-kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  kafka-connect:
    build:
      context: ./infra/cdc/connect
      dockerfile: Dockerfile
    container_name: enjoytrip-kafka-connect
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_CONNECT_PORT:-8083}:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: enjoytrip-cdc-connect
      CONNECT_CONFIG_STORAGE_TOPIC: enjoytrip-cdc-connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: enjoytrip-cdc-connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: enjoytrip-cdc-connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      CONNECT_CONNECTOR_CLIENT_CONFIG_OVERRIDE_POLICY: All
      CONNECT_LOG4J_ROOT_LOGLEVEL: INFO
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/connectors >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 24

  clickhouse:
    image: clickhouse/clickhouse-server:25.5
    container_name: enjoytrip-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-enjoytrip_clickhouse}
      TZ: Asia/Seoul
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - enjoytrip-clickhouse-data:/var/lib/clickhouse
      - ./infra/cdc/clickhouse/001_attraction_favorites_events.sql:/docker-entrypoint-initdb.d/001_attraction_favorites_events.sql:ro
      - ./infra/cdc/clickhouse/002_attraction_favorites_counts.sql:/docker-entrypoint-initdb.d/002_attraction_favorites_counts.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user default --password ${CLICKHOUSE_PASSWORD:-enjoytrip_clickhouse} --query 'SELECT 1' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  cdc-postgres-bootstrap:
    image: postgres:17
    container_name: enjoytrip-cdc-postgres-bootstrap
    profiles: ["cdc-bootstrap"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-enjoytrip}
      POSTGRES_USER: ${POSTGRES_USER:-ssafy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ssafy}
      CDC_DB_USER: ${CDC_DB_USER:-enjoytrip_cdc}
      CDC_DB_PASSWORD: ${CDC_DB_PASSWORD:-enjoytrip_cdc}
      CDC_PUBLICATION_BOOTSTRAP_TIMEOUT_SECONDS: ${CDC_PUBLICATION_BOOTSTRAP_TIMEOUT_SECONDS:-600}
    volumes:
      - ./infra/cdc/postgres:/cdc/postgres:ro
    entrypoint: ["/cdc/postgres/bootstrap-publication.sh"]

  kafka-connect-bootstrap:
    image: python:3.12-slim
    container_name: enjoytrip-kafka-connect-bootstrap
    profiles: ["cdc-bootstrap"]
    depends_on:
      kafka-connect:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      cdc-postgres-bootstrap:
        condition: service_completed_successfully
    environment:
      CONNECT_URL: http://kafka-connect:8083
      CONNECTOR_DIR: /cdc/connectors
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-enjoytrip}
      CDC_DB_USER: ${CDC_DB_USER:-enjoytrip_cdc}
      CDC_DB_PASSWORD: ${CDC_DB_PASSWORD:-enjoytrip_cdc}
    volumes:
      - ./infra/cdc/connectors:/cdc/connectors:ro
    entrypoint: ["/cdc/connectors/bootstrap-connectors.sh"]

volumes:
  enjoytrip-postgres-data:
  enjoytrip-pgadmin-data:
  enjoytrip-kafka-data:
  enjoytrip-clickhouse-data:
  enjoytrip-tempo-data:
  enjoytrip-grafana-data:
  enjoytrip-prometheus-data:
