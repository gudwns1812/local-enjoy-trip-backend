services:
  db:
    build:
      context: ./infra/postgres-vector
    image: enjoytrip-postgis-pgvector:17-3.5
    platform: linux/amd64
    container_name: enjoytrip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - enjoytrip-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: enjoytrip-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - enjoytrip-pgadmin-data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: enjoytrip-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: enjoytrip-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${ENJOYTRIP_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${ENJOYTRIP_MINIO_SECRET_KEY:-minioadmin}
      TZ: Asia/Seoul
    ports:
      - "${MINIO_API_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - enjoytrip-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio-bootstrap:
    image: minio/mc:latest
    container_name: enjoytrip-minio-bootstrap
    depends_on:
      minio:
        condition: service_healthy
    environment:
      ENJOYTRIP_MINIO_BUCKET: ${ENJOYTRIP_MINIO_BUCKET:-gotgot-notes}
      ENJOYTRIP_MINIO_ACCESS_KEY: ${ENJOYTRIP_MINIO_ACCESS_KEY:-minioadmin}
      ENJOYTRIP_MINIO_SECRET_KEY: ${ENJOYTRIP_MINIO_SECRET_KEY:-minioadmin}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$${ENJOYTRIP_MINIO_ACCESS_KEY}" "$${ENJOYTRIP_MINIO_SECRET_KEY}"
        mc mb --ignore-existing "local/$${ENJOYTRIP_MINIO_BUCKET}"
        mc anonymous set download "local/$${ENJOYTRIP_MINIO_BUCKET}"


volumes:
  enjoytrip-postgres-data:
  enjoytrip-minio-data:
  enjoytrip-pgadmin-data:
