<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>관리자 장소 관리</title>
    <link rel="stylesheet" href="/assets/admin/admin.css">
    <script defer src="/assets/admin/admin-places.js"></script>
</head>
<body>
<div class="admin-shell">
    <aside class="admin-sidebar">
        <a class="admin-brand" href="/admin">
            <img src="/assets/admin/spot-logo.png" alt="이곳저곳 로고">
            <span><small>Spot Admin</small><strong>이곳저곳</strong></span>
        </a>
        <nav class="admin-nav" aria-label="백오피스 메뉴">
            <a href="/admin"><span>대시보드</span></a>
            <a href="/admin/courses"><span>코스 관리</span></a>
            <a href="/admin/users"><span>유저 관리</span></a>
            <a class="is-active" href="/admin/places"><span>장소 관리</span></a>
            <form method="post" action="/admin/logout">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit">로그아웃</button>
            </form>
        </nav>
        <div class="admin-insight">
            <strong>장소 품질</strong>
            <p>지도와 코스에 노출되는 장소의 숨김, 복구, 중복 상태를 운영자가 관리합니다.</p>
        </div>
    </aside>

    <main class="admin-main">
        <header class="admin-topbar">
            <div>
                <p class="admin-eyebrow">Place Management</p>
                <h1 class="admin-title">장소 관리</h1>
            </div>
            <div class="admin-actions">
                <input class="admin-search" type="search" placeholder="장소명, 주소, 상태 검색">
                <a class="admin-button" href="/admin">대시보드</a>
            </div>
        </header>

        <div class="admin-content">
            <p class="admin-notice"
               data-admin-notice
               th:classappend="${message} ? '' : ' is-hidden'"
               th:text="${message}"></p>

            <section class="admin-card admin-card-padded">
                <p class="admin-eyebrow">Create Place</p>
                <h2 class="admin-title" style="font-size:26px">장소 생성</h2>
                <form class="admin-form-grid" method="post" action="/admin/places" th:object="${placeForm}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <label class="admin-field">ID <input type="number" name="id" th:value="*{id}"></label>
                    <label class="admin-field is-wide">제목 <input name="title" th:value="*{title}"></label>
                    <label class="admin-field is-wide">주소1 <input name="addr1" th:value="*{addr1}"></label>
                    <label class="admin-field">주소2 <input name="addr2" th:value="*{addr2}"></label>
                    <label class="admin-field is-wide">이미지1 <input name="firstImage" th:value="*{firstImage}"></label>
                    <label class="admin-field is-wide">이미지2 <input name="firstImage2" th:value="*{firstImage2}"></label>
                    <label class="admin-field">시도 <input type="number" name="sidoCode" th:value="*{sidoCode}"></label>
                    <label class="admin-field">구군 <input type="number" name="gugunCode" th:value="*{gugunCode}"></label>
                    <label class="admin-field">
                        위도
                        <input type="number" step="0.0000001" name="latitude" th:value="*{latitude}">
                    </label>
                    <label class="admin-field">
                        경도
                        <input type="number" step="0.0000001" name="longitude" th:value="*{longitude}">
                    </label>
                    <label class="admin-field">콘텐츠 타입 <input name="contentTypeId" th:value="*{contentTypeId}"></label>
                    <label class="admin-field is-full">
                        설명
                        <textarea name="overview" th:text="*{overview}"></textarea>
                    </label>
                    <div class="admin-form-actions">
                        <button class="admin-button" type="submit">장소 생성</button>
                    </div>
                </form>
            </section>

            <section class="admin-card" style="margin-top:24px">
                <div class="admin-card-title">
                    <div>
                        <p class="admin-eyebrow">Places</p>
                        <h2>장소 목록</h2>
                        <span class="admin-form-help"
                              data-place-count
                              th:text="|총 ${placePage.totalCount()}개 · 페이지당 ${placePage.pageSize()}개|">
                            총 0개 · 페이지당 20개
                        </span>
                    </div>
                    <a class="admin-secondary-button" th:href="@{/admin/places(includeHidden=${!includeHidden})}"
                       th:text="${includeHidden} ? '숨김 제외' : '숨김 포함'">숨김 포함</a>
                </div>
                <table class="admin-table" data-admin-places-table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>장소</th>
                        <th>상태</th>
                        <th>중복 원본</th>
                        <th>관리</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="place : ${places}"
                        th:attr="data-place-row=${place.id()},data-place-status=${place.status()}">
                        <td th:text="${place.id()}">1</td>
                        <td>
                            <strong th:text="${place.title()}">장소명</strong>
                            <small th:text="${place.addr1()}">주소</small>
                        </td>
                        <td>
                            <span class="admin-status"
                                  data-place-status-label
                                  th:text="${place.status()}">ACTIVE</span>
                        </td>
                        <td th:text="${place.duplicateOfAttractionId()}">-</td>
                        <td data-place-actions>
                            <form th:if="${place.status() == 'ACTIVE'}"
                                  th:action="@{'/admin/places/' + ${place.id()} + '/hide'}"
                                  method="post"
                                  data-place-action-form>
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="includeHidden" th:value="${includeHidden}">
                                <input type="hidden" name="page" th:value="${page}">
                                <button class="admin-danger-button" type="submit">숨김</button>
                            </form>
                            <form th:if="${place.status() == 'HIDDEN'}"
                                  th:action="@{'/admin/places/' + ${place.id()} + '/restore'}"
                                  method="post"
                                  data-place-action-form>
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="includeHidden" th:value="${includeHidden}">
                                <input type="hidden" name="page" th:value="${page}">
                                <button class="admin-secondary-button" type="submit">숨김 해제</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(places)}">
                        <td colspan="5">등록된 장소가 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
                <nav class="admin-pagination" aria-label="장소 목록 페이지">
                    <a class="admin-secondary-button"
                       th:classappend="${placePage.hasPrevious()} ? '' : ' is-disabled'"
                       th:href="@{/admin/places(includeHidden=${includeHidden}, page=${placePage.previousPage()})}">
                        이전
                    </a>
                    <span data-place-page-indicator
                          th:text="|${placePage.currentPage()} / ${placePage.totalPages()}|">1 / 1</span>
                    <a class="admin-secondary-button"
                       th:classappend="${placePage.hasNext()} ? '' : ' is-disabled'"
                       th:href="@{/admin/places(includeHidden=${includeHidden}, page=${placePage.nextPage()})}">
                        다음
                    </a>
                </nav>
            </section>
        </div>
    </main>
</div>
</body>
</html>
