<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>관리자 로그인</title>
    <link rel="stylesheet" href="/assets/admin/admin.css">
</head>
<body class="admin-auth-page">
<main class="admin-auth-card">
    <a class="admin-brand" href="/admin/login">
        <img src="/assets/admin/spot-logo.png" alt="이곳저곳 로고">
        <span><small>Spot Admin</small><strong>이곳저곳</strong></span>
    </a>
    <p class="admin-eyebrow" style="margin-top:26px">Admin Login</p>
    <h1 class="admin-title">관리자 로그인</h1>
    <p class="admin-form-help">관리자 이메일과 비밀번호로 백오피스에 접속하세요.</p>
    <p class="admin-auth-alert" th:if="${param.error}">이메일, 비밀번호 또는 관리자 권한을 확인하세요.</p>
    <p class="admin-auth-success" th:if="${param.logout}">로그아웃되었습니다.</p>
    <form method="post" th:action="@{/admin/login}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label class="admin-field">
            이메일
            <input type="email" name="email" autocomplete="username" required>
        </label>
        <label class="admin-field">
            비밀번호
            <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <button class="admin-button" type="submit">로그인</button>
    </form>
</main>
</body>
</html>
