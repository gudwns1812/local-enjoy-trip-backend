<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>관리자 유저 관리</title>
    <link rel="stylesheet" href="/assets/admin/admin.css">
</head>
<body>
<div class="admin-shell">
    <aside class="admin-sidebar">
        <a class="admin-brand" href="/admin">
            <img src="/assets/admin/spot-logo.png" alt="이곳저곳 로고">
            <span><small>Spot Admin</small><strong>이곳저곳</strong></span>
        </a>
        <nav class="admin-nav" aria-label="백오피스 메뉴">
            <a href="/admin"><span>대시보드</span></a>
            <a href="/admin/courses"><span>코스 관리</span></a>
            <a class="is-active" href="/admin/users">
                <span>유저 관리</span><span class="badge" th:text="${totalUserCount}">0</span>
            </a>
            <a href="/admin/places"><span>장소 관리</span></a>
            <form method="post" action="/admin/logout">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit">로그아웃</button>
            </form>
        </nav>
        <div class="admin-insight">
            <strong>유저 운영</strong>
            <p>가입자, 관리자 권한, 이메일 계정을 빠르게 확인하는 운영자용 목록입니다.</p>
        </div>
    </aside>

    <main class="admin-main">
        <header class="admin-topbar">
            <div>
                <p class="admin-eyebrow">User Management</p>
                <h1 class="admin-title">유저 관리</h1>
            </div>
            <div class="admin-actions">
                <input class="admin-search" type="search" placeholder="유저명, 이메일, 권한 검색">
                <a class="admin-button" href="/admin">대시보드</a>
            </div>
        </header>

        <div class="admin-content">
            <section class="admin-metric-grid">
                <article class="admin-metric">
                    <span>전체 유저</span>
                    <strong th:text="${totalUserCount}">0</strong>
                    <em>최근 가입순</em>
                </article>
                <article class="admin-metric">
                    <span>관리자 계정</span>
                    <strong th:text="${adminUserCount}">0</strong>
                    <em>ADMIN 권한</em>
                </article>
                <article class="admin-metric">
                    <span>일반 유저</span>
                    <strong th:text="${totalUserCount - adminUserCount}">0</strong>
                    <em>USER 권한</em>
                </article>
                <article class="admin-metric">
                    <span>관리 상태</span>
                    <strong>정상</strong>
                    <em>조회 전용 화면</em>
                </article>
            </section>

            <section class="admin-card" style="margin-top:24px">
                <div class="admin-card-title">
                    <div><p class="admin-eyebrow">Members</p><h2>가입 유저 목록</h2></div>
                </div>
                <table class="admin-table">
                    <thead>
                    <tr>
                        <th>유저</th>
                        <th>아이디</th>
                        <th>이메일</th>
                        <th>권한</th>
                        <th>가입일</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td>
                            <div class="admin-user-row">
                                <span class="admin-avatar" th:text="${#strings.substring(user.displayName(), 0, 1)}">유</span>
                                <strong th:text="${user.displayName()}">사용자</strong>
                            </div>
                        </td>
                        <td th:text="${user.userId()}">user</td>
                        <td th:text="${user.email()}">email</td>
                        <td>
                            <span class="admin-status"
                                  th:classappend="${user.admin()} ? ' is-admin' : ' is-user'"
                                  th:text="${user.role()}">USER</span>
                        </td>
                        <td th:text="${user.createdAt()}">-</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="5">아직 가입 유저가 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </main>
</div>
</body>
</html>
