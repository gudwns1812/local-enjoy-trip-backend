server:
  port: ${PORT:8080}

spring:
  config:
    import:
      - db-core.yml
      - external.yml
      - monitoring.yml
  application:
    name: enjoytrip-web
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

enjoytrip:
  attraction:
    popularity:
      flush-delay-ms: ${ATTRACTION_POPULARITY_FLUSH_DELAY_MS:1000}
      flush-batch-size: ${ATTRACTION_POPULARITY_FLUSH_BATCH_SIZE:500}
  jwt:
    secret: ${ENJOYTRIP_JWT_SECRET:dev-only-enjoytrip-jwt-secret-change-me-please-32b}
    expiration-seconds: ${ENJOYTRIP_JWT_EXPIRATION_SECONDS:7200}
  oauth2:
    authorized-redirect-uri: ${ENJOYTRIP_OAUTH2_REDIRECT_URI:http://localhost:5173/oauth/callback}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
