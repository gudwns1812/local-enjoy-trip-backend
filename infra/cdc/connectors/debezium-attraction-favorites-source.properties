name=attraction-favorites-postgres-source
connector.class=io.debezium.connector.postgresql.PostgresConnector
tasks.max=1

# Local Postgres CDC connection. Phase 1 is local-dev only.
database.hostname=${POSTGRES_HOST:-db}
database.port=${POSTGRES_PORT:-5432}
database.user=${CDC_DB_USER:-enjoytrip_cdc}
database.password=${CDC_DB_PASSWORD:-enjoytrip_cdc}
database.dbname=${POSTGRES_DB:-enjoytrip}
plugin.name=pgoutput
slot.name=attraction_favorites_slot
publication.name=attraction_favorites_publication
publication.autocreate.mode=disabled

# Scope this source connector to the favorite edge table only.
topic.prefix=enjoytrip
schema.include.list=public
table.include.list=public.attraction_favorites
snapshot.mode=initial
tombstones.on.delete=true

# Schemaless JSON keeps the local ClickHouse sink bootstrap simple and inspectable.
key.converter=org.apache.kafka.connect.json.JsonConverter
key.converter.schemas.enable=false
value.converter=org.apache.kafka.connect.json.JsonConverter
value.converter.schemas.enable=false

# Transport/schema normalization only: flatten Debezium, rewrite deletes, drop tombstones,
# and preserve source metadata for ClickHouse-side analytics shaping.
transforms=unwrap
transforms.unwrap.type=io.debezium.transforms.ExtractNewRecordState
transforms.unwrap.delete.tombstone.handling.mode=rewrite
transforms.unwrap.add.fields=op,table,lsn,source.ts_ms,source.txId,source.snapshot
