server:
  port: ${PORT:8080}

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../../.env[.properties]
  application:
    name: enjoytrip-backend
  datasource:
    url: ${ENJOYTRIP_DB_URL:jdbc:postgresql://localhost:5432/enjoytrip}
    username: ${ENJOYTRIP_DB_USER:ssafy}
    password: ${ENJOYTRIP_DB_PASSWORD:ssafy}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    baseline-on-migrate: true
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: java.util.HashMap
    listener:
      ack-mode: manual

enjoytrip:
  external:
    tour-api:
      service-key: ${ENJOYTRIP_TOUR_API_KEY:${TOUR_API_KEY:}}
    ev-charger:
      api-key: ${DATA_PORTAL_API_KEY:${EV_CHARGER_API_KEY:${ENJOYTRIP_EV_API_KEY:${TOUR_API_KEY:}}}}
    open-weather-map:
      api-key: ${OPENWEATHERMAP_API_KEY:${OPENWEATHER_API_KEY:}}
    clickhouse:
      url: ${CLICKHOUSE_JDBC_URL:jdbc:clickhouse://localhost:8123/default}
      username: ${CLICKHOUSE_USER:default}
      password: ${CLICKHOUSE_PASSWORD:enjoytrip_clickhouse}
      query-timeout: ${CLICKHOUSE_QUERY_TIMEOUT:3s}
  jwt:
    secret: ${ENJOYTRIP_JWT_SECRET:dev-only-enjoytrip-jwt-secret-change-me-please-32b}
    expiration-seconds: ${ENJOYTRIP_JWT_EXPIRATION_SECONDS:7200}
  oauth2:
    authorized-redirect-uri: ${ENJOYTRIP_OAUTH2_REDIRECT_URI:http://localhost:5173/oauth/callback}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
  notification:
    outbox:
      cdc:
        enabled: ${NOTIFICATION_OUTBOX_CDC_ENABLED:true}
        topic: ${NOTIFICATION_OUTBOX_CDC_TOPIC:enjoytrip.public.notification_outbox}
        group-id: ${NOTIFICATION_OUTBOX_CDC_GROUP_ID:enjoytrip-notification-outbox}
