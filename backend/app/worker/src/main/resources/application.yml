spring:
  main:
    web-application-type: none
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../../.env[.properties]
  application:
    name: enjoytrip-worker
  datasource:
    url: ${ENJOYTRIP_DB_URL:jdbc:postgresql://localhost:5432/enjoytrip}
    username: ${ENJOYTRIP_DB_USER:ssafy}
    password: ${ENJOYTRIP_DB_PASSWORD:ssafy}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    listener:
      ack-mode: manual

enjoytrip:
  notification:
    outbox:
      cdc:
        enabled: ${NOTIFICATION_OUTBOX_CDC_ENABLED:true}
        topic: ${NOTIFICATION_OUTBOX_CDC_TOPIC:enjoytrip.public.notification_outbox}
        group-id: ${NOTIFICATION_OUTBOX_CDC_GROUP_ID:enjoytrip-notification-outbox}
