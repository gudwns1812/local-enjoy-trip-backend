spring:
  config:
    import:
      - db-core.yml
      - embedding-target-regions.yml
  application:
    name: enjoytrip-batch
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  batch:
    jdbc:
      initialize-schema: never
    job:
      enabled: false

enjoytrip:
  ai:
    embedding:
      gms:
        url: ${GMS_EMBEDDING_URL:https://gms.ssafy.io/gmsapi/api.openai.com/v1/embeddings}
        api-key: ${GMS_KEY:}
        timeout: ${GMS_EMBEDDING_TIMEOUT:30s}
        provider: gms
        model: text-embedding-3-large
        dimension: 3072
      expansion:
        gms:
          url: ${GMS_CHAT_COMPLETIONS_URL:https://gms.ssafy.io/gmsapi/api.openai.com/v1/chat/completions}
          api-key: ${GMS_KEY:}
          timeout: ${GMS_CHAT_COMPLETIONS_TIMEOUT:30s}
          model: gpt-5.4
          max-keywords: ${ATTRACTION_KEYWORD_EXPANSION_MAX_KEYWORDS:24}
      backfill:
        fail-on-outside-target-embeddings: true
